app = "danestves-dev"
kill_signal = "SIGINT"
kill_timeout = 5
processes = [ ]

[env]
  FLY = "true"
  HUSKY_SKIP_INSTALL = "1"
  NODE_ENV = "production"
  PORT = "8080"
  PRIMARY_REGION = "mia"

[experimental]
allowed_public_ports = [ ]
auto_rollback = true
cmd = "start.sh"
entrypoint = "sh"

[mounts]
source = "data"
destination = "/data"

[[services]]
internal_port = 8_080
processes = [ "app" ]
protocol = "tcp"
script_checks = [ ]

  [services.concurrency]
  hard_limit = 200
  soft_limit = 150
  type = "connections"

  [[services.ports]]
  handlers = [ "http" ]
  port = 80
  force_https = true

  [[services.ports]]
  handlers = [ "tls", "http" ]
  port = 443

  [[services.tcp_checks]]
  grace_period = "10s"
  interval = "15s"
  restart_limit = 6
  timeout = "2s"

  [[services.http_checks]]
  interval = 10_000
  grace_period = "20s"
  method = "get"
  path = "/healthcheck"
  protocol = "http"
  timeout = 2_000
  tls_skip_verify = false
  headers = { }
